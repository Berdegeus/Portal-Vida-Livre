<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/frontend/">
    <title>Verificando acesso... | Portal Vida Livre</title>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <style>
        body {
            background: var(--gray-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .admin-card {
            background: var(--gray-800);
            border: 1px solid var(--gray-700);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-700);
            border-top-color: var(--amber-500);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .admin-card h1 {
            font-family: var(--font-display);
            font-size: 24px;
            color: #FFFFFF;
            margin: 0 0 8px;
        }

        .admin-card .subtitle {
            color: var(--gray-400);
            font-size: 14px;
            margin: 0;
            line-height: 1.6;
        }

        .status-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .status-icon--success {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }

        .status-icon--error {
            background: rgba(248, 113, 113, 0.15);
            color: #f87171;
        }

        .admin-footer {
            margin-top: 28px;
        }

        .admin-footer a {
            color: var(--gray-500);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .admin-footer a:hover {
            color: var(--gray-300);
        }

        .hidden { display: none; }
    </style>
</head>

<body>
    <div class="admin-card">

        <!-- Estado: verificando -->
        <div id="state-loading">
            <div class="spinner"></div>
            <h1>Verificando acesso</h1>
            <p class="subtitle">Aguarde um instante...</p>
        </div>

        <!-- Estado: sucesso -->
        <div id="state-success" class="hidden">
            <div class="status-icon status-icon--success">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h1>Acesso autorizado</h1>
            <p class="subtitle">Redirecionando para o painel...</p>
        </div>

        <!-- Estado: erro -->
        <div id="state-error" class="hidden">
            <div class="status-icon status-icon--error">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <h1>Link inválido</h1>
            <p class="subtitle" id="error-message">O link expirou ou já foi utilizado.</p>
            <div class="admin-footer">
                <a href="/frontend/admin-login.html">Solicitar novo link</a>
            </div>
        </div>

    </div>

    <script src="./assets/js/api.js" defer></script>
    <script src="./assets/js/admin-verify.js" defer></script>
</body>

</html>
